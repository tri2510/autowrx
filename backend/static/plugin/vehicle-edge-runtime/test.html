<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Edge Runtime Plugin - Local Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
        }
        #root {
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0066cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fee;
            border: 1px solid #fcc;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
        }
        #error h3 {
            color: #c33;
            margin-bottom: 10px;
        }
        #error pre {
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            overflow: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading Vehicle Edge Runtime Plugin...</p>
    </div>
    <div id="error" style="display: none;"></div>
    <div id="root"></div>

    <!-- Load React first -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script>
        // Make React available globally for the plugin
        window.React = React;
        window.ReactDOM = ReactDOM;

        // Register the plugin under 'page-plugin' key (as expected by PluginPageRender)
        window.DAPlugins = window.DAPlugins || {};

        // Load the plugin
        const script = document.createElement('script');
        script.src = './index.js';
        script.onload = () => {
            setTimeout(() => {
                const plugin = window.DAPlugins['vehicle-edge-runtime'];
                if (plugin && plugin.components && plugin.components.Page) {
                    // Also register under 'page-plugin' for compatibility
                    window.DAPlugins['page-plugin'] = plugin;

                    // Hide loading
                    document.getElementById('loading').style.display = 'none';

                    // Render the plugin
                    const root = ReactDOM.createRoot(document.getElementById('root'));
                    root.render(React.createElement(plugin.components.Page, {
                        data: {
                            model: null,
                            prototype: null
                        },
                        config: {
                            plugin_id: 'vehicle-edge-runtime'
                        },
                        api: {
                            updateModel: async (updates) => {
                                console.log('updateModel called:', updates);
                                return {};
                            },
                            updatePrototype: async (updates) => {
                                console.log('updatePrototype called:', updates);
                                return {};
                            }
                        }
                    }));

                    console.log('✅ Plugin loaded successfully!');
                } else {
                    showError('Plugin component not found. window.DAPlugins =', window.DAPlugins);
                }
            }, 100);
        };
        script.onerror = (e) => {
            showError('Failed to load plugin script:', e);
        };
        document.body.appendChild(script);

        function showError(...messages) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `
                <h3>❌ Plugin Load Error</h3>
                ${messages.map(m => `<pre>${JSON.stringify(m, null, 2)}</pre>`).join('')}
            `;
            console.error(...messages);
        }
    </script>
</body>
</html>
